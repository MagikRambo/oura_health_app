# Fully decommissions ALL resources: main infra first, then bootstrap.
# WARNING: This is irreversible. You will lose all infrastructure and state.

name: Decommission

on:
  workflow_dispatch:

jobs:
  destroy-main:
    name: Destroy Main Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Azure credentials from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARM_CLIENT_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_CLIENT_ID"
          ARM_CLIENT_SECRET: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_CLIENT_SECRET"
          ARM_SUBSCRIPTION_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_SUBSCRIPTION_ID"
          ARM_TENANT_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_TENANT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve

  destroy-bootstrap:
    name: Destroy Bootstrap Infrastructure
    runs-on: ubuntu-latest
    needs: destroy-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Azure credentials from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARM_CLIENT_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_CLIENT_ID"
          ARM_CLIENT_SECRET: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_CLIENT_SECRET"
          ARM_SUBSCRIPTION_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_SUBSCRIPTION_ID"
          ARM_TENANT_ID: "op://${{ vars.OP_VAULT_NAME || 'dev' }}/Azure Service Principal - GitHub Actions/Azure Credentials/AZURE_TENANT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: bootstrap
        run: terraform init

      - name: Terraform Destroy
        working-directory: bootstrap
        run: terraform destroy -auto-approve -var="op_service_account_token=${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}"
