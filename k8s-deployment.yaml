apiVersion: apps/v1
kind: Deployment
metadata:
  name: oura-health-app
  labels:
    app: oura-health-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oura-health-app
  template:
    metadata:
      labels:
        app: oura-health-app
    spec:
      containers:
      - name: oura-health-app
        image: magikrambo.azurecr.io/oura-health-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: OURA_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oura-secrets
              key: OURA_CLIENT_ID
        - name: OURA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oura-secrets
              key: OURA_CLIENT_SECRET
        - name: OURA_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: oura-secrets
              key: OURA_REDIRECT_URI
        - name: OURA_SCOPE
          valueFrom:
            secretKeyRef:
              name: oura-secrets
              key: OURA_SCOPE
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: oura-health-app-service
spec:
  type: LoadBalancer
  loadBalancerIP: 20.84.17.177  # Your static IP here
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: oura-health-app
